name: Validate ledger

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate claims, provenance, temporal & supersession integrity
        run: python3 tools/ledger.py check
